name: Dependabot Auto-Merge

on:
  pull_request_target:
    branches: [main]
    types: [opened, reopened, synchronize, ready_for_review]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-automerge:
    if: >-
      ${{
        github.actor == 'dependabot[bot]' &&
        github.event.pull_request.draft == false
      }}
    runs-on: ubuntu-latest
    concurrency:
      group: dependabot-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@dbb049abf0d677abbd7f7eee0375145b417fdd34 # v2.3.0
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Only auto-merge patch updates
        if: steps.metadata.outputs.update-type == 'version-update:semver-major'
        run: |
          echo "::error::Major version updates require manual review."
          exit 1

      - name: Update branch to latest main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pr_api="repos/${{ github.repository }}/pulls/"
          pr_api+="${{ github.event.pull_request.number }}/update-branch"
          gh api \
            --method PUT \
            "$pr_api" || true

      - name: Approve Dependabot PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr review ${{ github.event.pull_request.number }} \
            --approve \
            --body "Auto-approved dependency update."

      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh pr merge ${{ github.event.pull_request.number }} \
            --squash \
            --auto \
            --delete-branch; then
            echo "Auto-merge enabled."
          else
            echo "Auto-merge unavailable; merging directly."
            gh pr merge ${{ github.event.pull_request.number }} \
              --squash \
              --delete-branch
          fi
