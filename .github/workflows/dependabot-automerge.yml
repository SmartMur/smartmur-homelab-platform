name: Dependabot Auto-Merge

on:
  pull_request_target:
    branches: [main]
    types: [opened, reopened, synchronize, ready_for_review]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-automerge:
    if: >-
      ${{
        github.actor == 'dependabot[bot]' &&
        github.event.pull_request.draft == false
      }}
    runs-on: ubuntu-latest
    concurrency:
      group: dependabot-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@21025c705c08248db411dc16f3619e6b5f9ea21a # v2.3.0
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Major updates require manual review
        if: steps.metadata.outputs.update-type == 'version-update:semver-major'
        run: |
          echo "::warning::Major version update detected; skipping auto-merge."

      - name: Update branch to latest main
        if: steps.metadata.outputs.update-type != 'version-update:semver-major'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pr_api="repos/${{ github.repository }}/pulls/"
          pr_api+="${{ github.event.pull_request.number }}/update-branch"
          gh api \
            --method PUT \
            "$pr_api" || true

      - name: Approve Dependabot PR
        if: steps.metadata.outputs.update-type != 'version-update:semver-major'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          gh pr review "$PR_URL" \
            --approve \
            --body "Auto-approved dependency update."

      - name: Enable auto-merge
        if: steps.metadata.outputs.update-type != 'version-update:semver-major'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          if gh pr merge "$PR_URL" \
            --squash \
            --auto \
            --delete-branch; then
            echo "Auto-merge enabled."
          else
            echo "Auto-merge unavailable; merging directly."
            gh pr merge "$PR_URL" \
              --squash \
              --delete-branch
          fi
