site_name: SmartMur Homelab Platform
site_url: https://smartmur.github.io/smartmur-homelab-platform/
repo_url: https://github.com/SmartMur/smartmur-homelab-platform
repo_name: SmartMur/smartmur-homelab-platform

theme:
  name: material
  logo: assets/smartmur-logo.png
  favicon: assets/smartmur-logo.png
  palette:
    - scheme: slate
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Quickstart: getting-started/quickstart.md
      - Beginner Guide: getting-started/beginner-guide.md
      - Quick Deploy: getting-started/quick-deploy.md
  - Architecture: architecture/architecture.md
  - Deployment:
      - Deployment Guide: deployment/deployment.md
      - Proxmox Deployment: deployment/proxmox-deployment.md
      - Migration Guide: deployment/migration-guide.md
  - Reference:
      - Hardware Calculator: reference/hardware-calculator.md
      - Security: reference/security.md
      - Security Rulebook: reference/security-rulebook.md
      - Contributing: reference/contributing.md
  - Changelog: changelog.md
